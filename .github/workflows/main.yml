name:Running Test
on:
  push:
    branches:["main"]
  pull_requests:
    branches:["main"]
  jobs:
    test:
      runs on:ubuntu-latest
    steps:
      name:Checkout repository
      uses:actions/checkout@v3
      name:setup python
      uses:actions/setup-python@v4
        with:
          python-version:"3.x"
      name:Install Dependencies
      uses:pip install pytest
        run:|
          pytest
